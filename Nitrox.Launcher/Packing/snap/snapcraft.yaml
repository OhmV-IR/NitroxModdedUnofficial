name: nitrox # you probably want to 'snapcraft register <name>'
base: core24 # the base snap is the execution environment for this snap
version: '1.8.0.0' # just for humans, typically '1.2+git' or '1.3.2'
summary: Multiplayer mod for Subnautica # 79 char long summary
description: |
  Contains both the dedicated server and launcher for the subnautica multiplayer
  mod, Nitrox.

grade: stable # must be 'stable' to release into candidate/stable channels
confinement: classic # DNC: Sandboxing from strict will mess up Nitrox real good

parts:
  dotnet-deps: # this was recommended by snapcraft itself I swear
    plugin: nil
    override-build: | # :c snap package doesn't have .net9
      apt install -y curl tar gzip libicu-dev libssl-dev zlib1g
      curl -L https://dot.net/v1/dotnet-install.sh -o dotnet-install.sh
      chmod +x ./dotnet-install.sh
      ./dotnet-install.sh --channel 9.0
  copy-sn:
    plugin: nil
    override-build: |
      mkdir -p "$SNAPCRAFT_PART_INSTALL/Subnautica/"
      cp -r "/mnt/c/Program Files (x86)/Steam/steamapps/common/Subnautica" "$SNAPCRAFT_PART_INSTALL/Subnautica"
  all:
    # See 'snapcraft plugins'
    after: [dotnet-deps, copy-sn]
    plugin: dotnet
    #source: ../../../
    source: https://github.com/SubnauticaNitrox/Nitrox.git

apps:
  launcher:
    command: nitroxlauncher
    plugs:
      - network
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - audio-playback
  server:
    command: nitroxserver
    plugs:
      - network